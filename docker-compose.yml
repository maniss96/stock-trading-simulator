version: '3.8'

services:
  # =====================================================
  # MongoDB Database
  # =====================================================
  mongodb:
    image: mongo:7
    container_name: stocksim-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-stocksim_secure_pass}
      MONGO_INITDB_DATABASE: stock-trading-simulator
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - stocksim-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  # =====================================================
  # Redis Cache
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: stocksim-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-stocksim_redis_pass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - stocksim-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5

  # =====================================================
  # Backend API Server
  # =====================================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stocksim-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-stocksim_secure_pass}@mongodb:27017/stock-trading-simulator?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-stocksim_redis_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-64-char-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-64-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      STOCK_API_KEY: ${STOCK_API_KEY:-demo}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      BCRYPT_SALT_ROUNDS: 12
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stocksim-network

  # =====================================================
  # Frontend (Next.js)
  # =====================================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: stocksim-client
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:5000}
    depends_on:
      - server
    networks:
      - stocksim-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  stocksim-network:
    driver: bridge
